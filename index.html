<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasan AI Ultimate Trader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #0f172a, #020617); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 25px; text-align: center; width: 95%; max-width: 450px; border: 1px solid #334155; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); position: relative; }
        #clock { position: absolute; top: 15px; right: 20px; font-size: 14px; color: #f0b90b; font-weight: bold; }
        select { width: 48%; padding: 10px; margin: 8px 1%; border-radius: 10px; border: 1px solid #474d57; background: #0f172a; color: white; text-align: center; font-size: 12px; }
        
        /* লোগো এবং টাইটেলের জন্য নতুন স্টাইল */
        .app-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .app-logo { width: 80px; height: auto; margin-bottom: 5px; }
        .app-title { color: #00ff88; margin: 0; font-size: 20px; font-weight: bold; }

        video { width: 100%; border-radius: 15px; border: 2px solid #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        #result { margin-top: 15px; font-size: 16px; font-weight: bold; color: #00ff88; min-height: 100px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border: 1px dashed #00ff88; line-height: 1.4; }
        .scan-line { width: 100%; height: 2px; background: #00ff88; position: absolute; top: 50%; left: 0; animation: scan 2s infinite; opacity: 0.6; pointer-events: none; }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }
    </style>
</head>
<body onload="startApp()">

    <div class="container">
        <div id="clock">00:00:00</div>
        
        <div class="app-header">
            <img src="image_1.png" alt="IKTIDAR Logo" class="app-logo"> 
            <h3 class="app-title">AI LIVE SCANNER</h3>
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <select id="timeframe">
                <option value="1 minute">1 min Trade</option>
                <option value="2 minutes">2 min Trade</option>
                <option value="5 minutes">5 min Trade</option>
            </select>
            <select id="voiceType">
                <option value="female">মেয়ের কন্ঠ</option>
                <option value="male">ছেলের কন্ঠ</option>
            </select>
        </div>

        <div style="position: relative;">
            <video id="video" autoplay playsinline></video>
            <div class="scan-line"></div>
        </div>
        
        <div id="result">ক্যামেরা চালু হচ্ছে... অটো স্ক্যান শুরু হতে ১০ সেকেন্ড সময় দিন।</div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultDiv = document.getElementById('result');
        const apiKey = "AIzaSyBGITlkWp0CP3VXki1lM4CA66RhguB83H0"; 

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                setInterval(autoAnalyze, 12000); 
            } catch (err) {
                resultDiv.innerText = "ক্যামেরা পারমিশন দিন এবং পেজটি রিফ্রেশ করুন!";
            }
        }

        async function autoAnalyze() {
            if (!video.srcObject) return;
            const tf = document.getElementById('timeframe').value;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Data = canvas.toDataURL('image/jpeg').split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Analyze the running candle for a ${tf} trade. Trend status, next candle prediction (UP/DOWN) 1 minute ahead, confidence %, and Martingale advice. Answer in Bengali shortly.` },
                            { inline_data: { mime_type: "image/jpeg", data: base64Data } }]
                        }]
                    })
                });
                const data = await response.json();
                const signal = data.candidates[0].content.parts[0].text;
                resultDiv.innerText = signal;
                speakSignal(signal);
            } catch (e) { console.log("Error analyzing chart..."); }
        }

        function speakSignal(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voiceType = document.getElementById('voiceType').value;
            utterance.pitch = (voiceType === 'male') ? 0.7 : 1.3;
            utterance.lang = 'bn-BD';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
