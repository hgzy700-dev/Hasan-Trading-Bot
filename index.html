<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasan AI Ultimate Trader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #0f172a, #020617); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 25px; text-align: center; width: 95%; max-width: 450px; border: 1px solid #334155; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); position: relative; }
        #clock { position: absolute; top: 15px; right: 20px; font-size: 14px; color: #f0b90b; font-weight: bold; }
        select, input { width: 95%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #474d57; background: #0f172a; color: white; text-align: center; }
        video { width: 100%; border-radius: 15px; border: 2px solid #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        #result { margin-top: 15px; font-size: 16px; font-weight: bold; color: #00ff88; min-height: 100px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border: 1px dashed #00ff88; line-height: 1.4; }
        .btn { background: linear-gradient(90deg, #f0b90b, #d8a608); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; }
        .scan-line { width: 100%; height: 2px; background: #00ff88; position: absolute; top: 50%; left: 0; animation: scan 2s infinite; opacity: 0.6; pointer-events: none; }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h2 style="color: #f0b90b; letter-spacing: 2px;">HASAN AI PRO</h2>
        <input type="text" id="passInput" placeholder="পাসওয়ার্ড লিখুন">
        <button class="btn" onclick="checkLogin()">LOGIN</button>
        <p id="loginError" style="color: #ff4d4d; margin-top: 10px;"></p>
    </div>

    <div id="app-section" class="container" style="display: none;">
        <div id="clock">00:00:00</div>
        <h3 style="color: #00ff88; margin-top: 0;">AI LIVE SCANNER</h3>
        
        <div style="display: flex; gap: 5px;">
            <select id="timeframe">
                <option value="1 minute">1 min Trade</option>
                <option value="2 minutes">2 min Trade</option>
                <option value="5 minutes">5 min Trade</option>
            </select>
            <select id="voiceType">
                <option value="female">মেয়ের কন্ঠ</option>
                <option value="male">ছেলের কন্ঠ</option>
            </select>
        </div>

        <div style="position: relative; margin-top: 10px;">
            <video id="video" autoplay playsinline></video>
            <div class="scan-line"></div>
        </div>
        
        <div id="result">রানিং ক্যান্ডেল স্ক্যান হচ্ছে...</div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultDiv = document.getElementById('result');
        const apiKey = "AIzaSyBGITlkWp0CP3VXki1lM4CA66RhguB83H0"; 
        
        // আপনার নতুন পাসওয়ার্ড এখানে
        const correctPass = "hasan456"; 

        function checkLogin() {
            const inputVal = document.getElementById('passInput').value;
            if (inputVal === correctPass) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                startCamera();
                setInterval(autoAnalyze, 12000); 
            } else { 
                document.getElementById('loginError').innerText = "ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।"; 
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) {
                resultDiv.innerText = "ক্যামেরা পারমিশন দিন!";
            }
        }

        async function autoAnalyze() {
            if (!video.srcObject) return;
            const tf = document.getElementById('timeframe').value;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Data = canvas.toDataURL('image/jpeg').split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Analyze the running candle for a ${tf} trade. Trend status, next candle prediction (UP/DOWN) 1 minute ahead, confidence %, and Martingale advice. Answer in Bengali shortly.` },
                            { inline_data: { mime_type: "image/jpeg", data: base64Data } }]
                        }]
                    })
                });
                const data = await response.json();
                const signal = data.candidates[0].content.parts[0].text;
                resultDiv.innerText = signal;
                speakSignal(signal);
            } catch (e) { console.log("Error..."); }
        }

        function speakSignal(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voiceType = document.getElementById('voiceType').value;
            utterance.pitch = (voiceType === 'male') ? 0.7 : 1.3;
            utterance.lang = 'bn-BD';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
