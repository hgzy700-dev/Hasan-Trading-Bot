<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASAN PRO - AI Mentor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .market-view { flex: 2; width: 100%; border-bottom: 2px solid #d4af37; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .stats-strip { background: #111; padding: 8px; display: flex; justify-content: space-around; font-size: 12px; font-weight: bold; border-bottom: 1px solid #333; }
        .win { color: #00ff88; } .loss { color: #ff4444; }

        .ai-mentor-panel { flex: 2; background: #050505; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 -10px 40px rgba(212,175,55,0.3); overflow-y: auto; }
        .chat-container { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 10px; }
        video { width: 35%; height: 90px; border-radius: 10px; border: 1px solid #d4af37; object-fit: cover; }
        
        #mentor-chat { flex: 1; background: rgba(212, 175, 55, 0.05); border-radius: 12px; border-left: 4px solid #d4af37; padding: 15px; font-size: 14px; color: #eee; line-height: 1.6; min-height: 100px; box-shadow: inset 0 0 10px #000; }
        
        .btn-box { display: flex; gap: 10px; padding-bottom: 10px; }
        button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-gold { background: linear-gradient(90deg, #d4af37, #f7e08a); color: #000; }
        .btn-dark { background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body onload="initApp()">

    <div class="market-view">
        <iframe src="https://pocketoption.com/en/cabinet/demo-quick-high-low/" id="marketFrame"></iframe>
    </div>

    <div class="stats-strip">
        <div class="win">✅ WIN: <span id="w">0</span></div>
        <div class="loss">❌ LOSS: <span id="l">0</span></div>
        <div style="color:#d4af37">📊 ACCURACY: <span id="a">0%</span></div>
    </div>

    <div class="ai-mentor-panel">
        <div class="chat-container">
            <video id="video" autoplay playsinline></video>
            <div id="mentor-chat">
                <strong>হাসান প্রো মেন্টর:</strong> হ্যালো হাসান ভাই! ক্যামেরা বা স্ক্রিন শেয়ার চালু করুন। আমি শুধু সিগন্যাল দিব না, মার্কেট কেন এমন করছে সেটাও আপনাকে বুঝিয়ে বলব।
            </div>
        </div>
        
        <div class="btn-box">
            <button class="btn-gold" onclick="startCam()">BACK CAMERA</button>
            <button class="btn-gold" onclick="startScreen()">SCREEN SHARE</button>
            <button class="btn-dark" onclick="resetStats()">RESET</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), chat = document.getElementById('mentor-chat');
        let wins = 0, losses = 0;
        const apiKey = "AIzaSyBGITlkWp0CP3VXki1lM4CA66RhguB83H0";

        function initApp() { speak("হাসান ভাই, আপনার পার্সোনাল ট্রেডিং মেন্টর তৈরি। চলুন মার্কেট এনালাইসিস করি।"); }

        async function startCam() {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = s; startMentoring();
        }

        async function startScreen() {
            const s = await navigator.mediaDevices.getDisplayMedia({ video: true });
            video.srcObject = s; startMentoring();
        }

        function startMentoring() {
            chat.innerHTML = "<strong>AI:</strong> মার্কেট স্ক্যান করছি... একটু অপেক্ষা করুন হাসান ভাই।";
            setInterval(analyzeWithLogic, 18000); 
        }

        async function analyzeWithLogic() {
            if (!video.srcObject) return;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const b64 = canvas.toDataURL('image/jpeg').split(',')[1];

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "You are Hasan Pro's personal trading mentor. Analyze the chart. 1. Predict next candle (UP/DOWN). 2. Explain WHY (e.g. RSI overbought, strong support, green candle pressure). Speak in Bengali like a human friend. Example: 'হাসান ভাই, এখন কল ট্রেড নিন। কারণ মার্কেট সাপোর্ট জোন থেকে রিজেকশন নিয়েছে।'" }, { inline_data: { mime_type: "image/jpeg", data: b64 } }] }] })
                });
                const d = await res.json();
                const responseText = d.candidates[0].content.parts[0].text;
                
                chat.innerHTML = `<strong>মেন্টর গাইড:</strong> ${responseText}`;
                speak(responseText);

                // উইন/লস আপডেট (সিম্পল লজিক)
                if(responseText.includes("উপরে") || responseText.includes("কল") || responseText.includes("উইন")) { wins++; } 
                else { losses++; }
                updateStats();
            } catch (e) { console.log("Error..."); }
        }

        function updateStats() {
            document.getElementById('w').innerText = wins;
            document.getElementById('l').innerText = losses;
            let total = wins + losses;
            document.getElementById('a').innerText = total > 0 ? Math.round((wins/total)*100) + "%" : "0%";
        }

        function resetStats() { wins = 0; losses = 0; updateStats(); chat.innerHTML = "পরিসংখ্যান রিসেট করা হয়েছে।"; }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t); u.lang = 'bn-BD';
            u.pitch = 1.1; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
