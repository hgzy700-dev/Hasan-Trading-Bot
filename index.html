<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASAN SIR - FINAL PRO FIX</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .m-nav { position: absolute; top: 0; width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: #111; border-bottom: 2px solid #d4af37; }
        .m-btn { background: #222; color: #d4af37; border: 1px solid #d4af37; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .m-btn.active { background: #d4af37; color: #000; }
        .card { width: 85%; max-width: 400px; padding: 40px 20px; border-radius: 30px; background: #0a0a0a; border: 4px solid #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        #sig-text { font-size: 60px; font-weight: 900; margin: 20px 0; color: #d4af37; }
        .btn-go { margin-top: 30px; background: #fff; color: #000; border: none; padding: 18px 70px; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div class="m-nav">
        <button class="m-btn active" onclick="chM('EUR/USD OTC', this)">EUR/USD</button>
        <button class="m-btn" onclick="chM('AUD/CAD OTC', this)">AUD/CAD</button>
        <button class="m-btn" onclick="chM('BITCOIN', this)">BITCOIN</button>
    </div>

    <div class="card">
        <div id="m-label" style="color: #888; text-transform: uppercase;">EUR/USD OTC</div>
        <div id="sig-text">READY</div>
        <div id="reason-text" style="font-size: 15px; color: #ccc;">হাসান স্যার, সিগন্যাল নিতে নিচের বাটনে ক্লিক করুন।</div>
    </div>

    <button class="btn-go" onclick="startSignal()">Take Signal</button>

    <script>
        let selectedM = "EUR/USD OTC";
        const sigEl = document.getElementById('sig-text');
        const resEl = document.getElementById('reason-text');
        const mEl = document.getElementById('m-label');

        function chM(n, b) {
            document.querySelectorAll('.m-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            selectedM = n;
            mEl.innerText = n;
        }

        async function startSignal() {
            sigEl.innerText = "WAIT...";
            resEl.innerText = "মার্কেট এনালাইসিস করছি...";
            
            try {
                // আপনার দেওয়া নতুন কী (Key) এখানে বসানো হয়েছে
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyDRBGkOfzprfYQhGAB7L-D_auHaZTbasV0`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Predict next 1-min candle for " + selectedM + ". Only say 'UP' or 'DOWN' and why in Bengali." }] }] })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;

                if (text.toUpperCase().includes("UP")) {
                    sigEl.innerText = "UP ↑";
                    sigEl.style.color = "#00ff88";
                } else {
                    sigEl.innerText = "DOWN ↓";
                    sigEl.style.color = "#ff4444";
                }
                resEl.innerText = text;

            } catch (err) {
                // যদি কী (Key) তে সমস্যা থাকে তবে এটি কাজ করবে
                sigEl.innerText = "ERROR";
                resEl.innerText = "হাসান স্যার, কি (Key) অথবা ইন্টারনেট কানেকশন চেক করুন।";
            }
        }
    </script>
</body>
</html>
