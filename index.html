<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASAN SIR - Pro AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #1a1a1a, #000); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* প্রফেশনাল হেডার মেনু */
        .market-header { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px; display: flex; gap: 12px; overflow-x: auto; border-bottom: 2px solid #d4af37; scrollbar-width: none; }
        .market-header::-webkit-scrollbar { display: none; }
        .m-btn { background: #111; color: #d4af37; border: 1px solid #d4af37; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.4s; font-size: 14px; }
        .m-btn.active { background: linear-gradient(45deg, #d4af37, #f1c40f); color: #000; box-shadow: 0 0 15px rgba(212,175,55,0.4); transform: scale(1.05); }

        /* মেইন সিগন্যাল কার্ড */
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 30px; border-radius: 40px; width: 85%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 1; }
        
        #m-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; }
        #sig-display { font-size: 65px; font-weight: 900; margin: 20px 0; color: #d4af37; text-shadow: 0 0 20px rgba(212,175,55,0.2); transition: 0.5s; }
        #logic-text { font-size: 16px; color: #ddd; line-height: 1.6; min-height: 50px; }

        /* প্রিমিয়াম বাটন */
        .take-btn { margin-top: 40px; background: #fff; color: #000; border: none; padding: 18px 70px; border-radius: 60px; font-weight: 900; cursor: pointer; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .take-btn:active { transform: scale(0.95); }

        /* ব্যাকগ্রাউন্ড এনিমেশন */
        .bg-glow { width: 150px; height: 150px; background: #d4af37; border-radius: 50%; filter: blur(80px); position: absolute; opacity: 0.2; animation: pulse 4s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.1; } 50% { transform: scale(1.5); opacity: 0.3; } 100% { transform: scale(1); opacity: 0.1; } }
    </style>
</head>
<body>

    <div class="market-header">
        <button class="m-btn active" onclick="setMarket('EUR/USD OTC', this)">EUR/USD</button>
        <button class="m-btn" onclick="setMarket('AUD/CAD OTC', this)">AUD/CAD</button>
        <button class="m-btn" onclick="setMarket('GBP/USD REAL', this)">GBP/USD</button>
        <button class="m-btn" onclick="setMarket('BITCOIN', this)">BTC/USDT</button>
        <button class="m-btn" onclick="setMarket('GOLD/XAUUSD', this)">GOLD</button>
    </div>

    <div class="main-container">
        <div class="bg-glow"></div>
        <div class="glass-card">
            <div id="m-title">EUR/USD OTC</div>
            <div id="sig-display">READY</div>
            <div id="logic-text">হাসান স্যার, ১ মিনিট অ্যাডভান্স এনালাইসিস শুরু করতে নিচের বাটনে ক্লিক করুন।</div>
        </div>

        <button class="take-btn" onclick="getProSignal()">Take Signal</button>
    </div>

    <script>
        let currentAsset = "EUR/USD OTC";
        const sigEl = document.getElementById('sig-display');
        const logicEl = document.getElementById('logic-text');
        const titleEl = document.getElementById('m-title');

        // আপনার নতুন API Key এখানে বসানো হয়েছে
        const HASAN_KEY = "AIzaSyDRBGkOfzprfYQhGAB7L-D_auHaZTbasV0"; 

        function setMarket(name, btn) {
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentAsset = name;
            titleEl.innerText = name;
            sigEl.innerText = "READY";
            sigEl.style.color = "#d4af37";
        }

        async function getProSignal() {
            sigEl.innerText = "Wait...";
            sigEl.style.color = "#d4af37";
            logicEl.innerText = "মার্কেট স্ক্যান করছি হাসান স্যার...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${HASAN_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Strictly predict next 1-minute candle for " + currentAsset + ". Respond only with 'UP' or 'DOWN' and one technical reason in Bengali." }] }] })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;

                if (text.toUpperCase().includes("UP")) {
                    sigEl.innerText = "UP ↑";
                    sigEl.style.color = "#00ff88";
                    sigEl.style.textShadow = "0 0 30px rgba(0,255,136,0.4)";
                } else {
                    sigEl.innerText = "DOWN ↓";
                    sigEl.style.color = "#ff4d4d";
                    sigEl.style.textShadow = "0 0 30px rgba(255,77,77,0.4)";
                }
                logicEl.innerText = text;

            } catch (error) {
                sigEl.innerText = "Error";
                logicEl.innerText = "হাসান স্যার, ইন্টারনেট চেক করুন অথবা কি (Key) যাচাই করুন।";
            }
        }
    </script>
</body>
</html>
