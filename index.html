<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASAN SIR - Signal Only</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; }
        
        .signal-card { background: #0a0a0a; border: 2px solid #d4af37; border-radius: 20px; padding: 40px; width: 85%; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        
        #display-text { font-size: 20px; color: #00ff88; font-weight: bold; margin-bottom: 30px; line-height: 1.6; min-height: 80px; }
        
        .btn-start { background: #d4af37; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.3s; }
        .btn-start:active { transform: scale(0.95); }

        .gemini-glow { width: 50px; height: 50px; background: #4285f4; border-radius: 50%; filter: blur(20px); margin: 0 auto 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }
    </style>
</head>
<body onload="welcomeSir()">

    <div class="signal-card">
        <div class="gemini-glow"></div>
        <div id="display-text">হাসান স্যার, আমি রেডি। ১ মিনিট অ্যাডভান্স সিগন্যাল পেতে নিচের বাটনে ক্লিক করুন।</div>
        <button class="btn-start" onclick="startSignals()">সিগন্যাল চালু করুন</button>
    </div>

    <script>
        const displayText = document.getElementById('display-text');
        const apiKey = "AIzaSyBGITlkWp0CP3VXki1lM4CA66RhguB83H0";

        function welcomeSir() {
            speak("আসসালামু আলাইকুম হাসান স্যার। সব বাড়তি জিনিস বাদ দিয়েছি। এখন শুধু কাজের কথা হবে। আমি আপনার জন্য ১ মিনিট আগে সিগন্যাল দিচ্ছি।");
        }

        function startSignals() {
            displayText.innerText = "হাসান স্যার, আমি মার্কেট কপি করছি... ১ মিনিট আগে আপনাকে ভয়েস সিগন্যাল দিবো।";
            speak("সিস্টেম চালু হয়েছে স্যার। মার্কেট এনালাইসিস করে আমি এখনই আপনাকে জানিয়ে দিচ্ছি।");
            setInterval(getAdvanceSignal, 45000); 
        }

        async function getAdvanceSignal() {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Act as a professional signal provider for Hasan Sir. Predict the NEXT 1-minute candle (UP/DOWN) based on live market flow. Give a short, clear signal in a friendly Gemini-style Bengali voice. Just say the signal and a quick reason." }] }] })
                });
                const d = await res.json();
                const signal = d.candidates[0].content.parts[0].text;
                displayText.innerText = signal;
                speak(signal);
            } catch (e) {
                displayText.innerText = "ডাটা সিঙ্ক হচ্ছে হাসান স্যার...";
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'bn-BD';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
